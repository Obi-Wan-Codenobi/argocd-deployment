apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: cloudflare-tunnel
data:
  config.yaml: |
    no-autoupdate: true
    metrics: 0.0.0.0:2000

    ingress:
      # Private: ArgoCD — protect this with Cloudflare Access in the dashboard
      - hostname: argocd.kadesingleton.com
        service: http://argocd-server.argocd.svc.cluster.local:80

      # Public: DispatcherHQ API
      - hostname: boatmen.kadesingleton.com
        path: /api
        service: http://dispatcherhq-api-service.dev-dispatcherhq.svc.cluster.local:80

      # Public: DispatcherHQ website
      - hostname: boatmen.kadesingleton.com
        service: http://dispatcherhq-client-service.prod-dispatcherhq.svc.cluster.local:80

      # Public: Portfolio
      - hostname: kadesingleton.com
        service: http://portfolio-service.prod.svc.cluster.local:80

      # Catch-all required by cloudflared
      - service: http_status:404
